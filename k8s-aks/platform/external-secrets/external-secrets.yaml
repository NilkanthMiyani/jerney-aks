# ==============================================================
# ExternalSecrets — Azure Key Vault
# ==============================================================

# PostgreSQL password → K8s Secret "jerney-db-credentials" in namespace "jerney"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jerney-db-credentials
  namespace: jerney
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: jerney-db-credentials
  data:
    - secretKey: password
      remoteRef:
        key: jerney-postgres-password
---
# Grafana admin credentials → K8s Secret "jerney-grafana-credentials" in namespace "monitoring"
# Grafana chart expects TWO keys: admin-user + admin-password
# Username is static ("admin"), password comes from Key Vault
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jerney-grafana-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: jerney-grafana-credentials
    template:
      data:
        admin-user: admin
        admin-password: "{{ .admin_password }}"
  data:
    - secretKey: admin_password
      remoteRef:
        key: jerney-grafana-admin-password
---
# Alertmanager SMTP key → K8s Secret "alertmanager-smtp-key" in namespace "monitoring"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-smtp-key
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: alertmanager-smtp-key
  data:
    - secretKey: smtp_auth_password
      remoteRef:
        key: jerney-alertmanager-smtp-key
