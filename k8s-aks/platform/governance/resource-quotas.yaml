# ==============================================================
# Namespaces + ResourceQuotas + LimitRanges
#
# Namespaces are declared here so quotas always have somewhere
# to land — ArgoCD applies Namespace resources before namespaced
# resources within the same Application, so no ordering issue.
#
# Cluster: 2× Standard_D2s_v7 (2 vCPU, 8 GB) = 4 vCPU / 16 GB
# Usable after system overhead (~15%): ~3.4 vCPU / ~13.6 GB
# Observability stack: Prometheus + Loki + Grafana + Alertmanager (monitoring ns)
#
# LimitRange interaction: defaults apply to any pod that omits
# requests/limits. kube-prometheus-stack has ~20 pods; with a
# 256Mi default that's 5 GB in defaults alone — so monitoring
# limits quota must be set with that headroom in mind.
# ==============================================================

# ================================================================
# jerney
# ================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: jerney
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: jerney-quota
  namespace: jerney
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "2"
    limits.memory: 4Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: jerney-limits
  namespace: jerney
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
      max:
        cpu: "1"
        memory: 2Gi

---
# ================================================================
# monitoring (kube-prometheus-stack)
#
# Prometheus alone requests ~512Mi; with Grafana, Alertmanager,
# node-exporter×2, kube-state-metrics the stack totals ~1.4 Gi
# requests. However, LimitRange defaults apply to any pod without
# explicit limits — chart pods all set their own limits, but init
# containers may not. Keep limits quota generous (12Gi) to avoid
# blocking chart upgrades.
# ================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 6Gi
    limits.cpu: "4"
    limits.memory: 12Gi
    pods: "40"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: monitoring
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 200m
        memory: 256Mi
      max:
        cpu: "2"
        memory: 4Gi

---
