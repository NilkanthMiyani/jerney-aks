# ================================================================
# ingress-nginx
# ================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ingress-nginx-quota
  namespace: ingress-nginx
spec:
  hard:
    requests.cpu: "200m"
    requests.memory: 256Mi
    # The controller's own limit is 500m; a rolling update briefly runs a
    # surge pod, needing room for two controllers. Capping at 500m wedges
    # every rollout (and admission hook Jobs) on the quota.
    limits.cpu: "1"
    limits.memory: 512Mi
    pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ingress-nginx-limits
  namespace: ingress-nginx
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 200m
        memory: 256Mi
      max:
        cpu: "500m"
        memory: 512Mi

---
